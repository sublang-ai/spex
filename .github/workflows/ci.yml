name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # CI builds every workspace but never launches Electron.
  ELECTRON_SKIP_BINARY_DOWNLOAD: 1

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]
        exclude:
          # better-sqlite3 ships no win32 prebuild for the Node 20 ABI
          # and the source build trips node-gyp's VS detection there;
          # Node 20 coverage stays on ubuntu/macos.
          - os: windows-latest
            node-version: 20
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Tests
        run: npm test
